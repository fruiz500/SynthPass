<!DOCTYPE html>
<html lang="en" xml:lang="en" xmlns="http://www.w3.org/1999/xhtml">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <title>SynthPass Passwords</title>
  <meta name="Keywords"
    content="steganography, F5, passlok, URSA, browser, encryption, decryption, symmetric, public key, signature, AES, ECDH, Diffie, Hellman, elliptic curve, advanced, javascript, PGP, PRISM">
  <meta name="Description" content="SynthPass Password Synthesizer">
  <meta name="author" content="F. Ruiz">
  <meta name="robots" content="index">
  <meta name="viewport" content="width=device-width, minimum-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!--Default stylesheet containing the Light color scheme-->
  <link rel="stylesheet" href="../css/style.css">

  <!--License notice and SSL force-->
  <script src="../js-src/license.js"></script>

  <!--this only loads two regular expressions: blackListExp and wordListExp, plus their lengths-->
  <script src="../js-src/dictionary_en.js"></script>

  <!--TweetNaCl crypto library 1.0.3 by Dmitry Chestnykh. https://github.com/dchest/tweetnacl-js-->
  <script src="../js-lib/nacl-fast.js"></script>

  <!--scrypt-async-js KDF 2.0.1 by Dmitry Chestnykh. https://github.com/dchest/scrypt-async-js-->
  <script src="../js-lib/scrypt-async.js"></script>

  <!--code specific to this HTML document-->

  <!--crypto code common with Privacy Bar, based on WiseHash, by yours truly. https://github.com/fruiz500/wisehash--->
  <script src="../js-src/crypto-common.js"></script>

  <!--main code-->
  <script src="../js-src/main.js"></script>

</head>

<body>
  <div id="mainScr" class="w300">
    <div class="header-row">
      <h3 id="synthTitle">SynthPass 2</h3>
      <div class="header-btns">
        <button class="cssbutton header-btn" id="helpBtn">Help</button>
      </div>
    </div>

    <div id="mainMsg" class="message">Enter Master Key to begin</div>

    <div class="card">
      <div class="input-container">
        <input type="password" id="m-pass" class="cssbox w100p" placeholder="Master Key">
        <img id="toggle-mpass" class="field-icon" src="../img/eye-24.png" title="Show/Hide">
      </div>

      <div class="strength-container">
        <div id="strength-fill" class="strength-fill"></div>
      </div>
      <div id="hashili-display" class="hashili-text mt4"></div>
    </div>

    <div class="card">
      <label for="userID">User ID</label>
      <input type="text" id="userID" class="cssbox w100p mb8" placeholder="Optional User ID">

      <div class="flex gap10 mb8">
        <div class="flex-1">
          <label for="serial">Serial</label>
          <input type="text" id="serial" class="cssbox w100p" placeholder="0">
        </div>
        <div class="flex-1">
          <label for="length-limit">Length</label>
          <input type="text" id="length-limit" class="cssbox w100p" placeholder="44">
        </div>
      </div>

      <label for="allowed-chars">Allowed Characters</label>
      <input type="text" id="allowed-chars" class="cssbox w100p mb8" placeholder="alphanumeric">

      <div class="classic-toggle">
        <label>
          <input type="checkbox" id="classic-mode"> Classic Engine (Legacy)
        </label>
      </div>

      <button id="do-synth" class="cssbutton w100p mb8">Synthesize & Fill</button>

      <div class="flex gap10">
        <button id="useVaultPwd" class="cssbutton flex-1">Vault</button>
        <button id="change-synth" class="cssbutton flex-1">Change Pwd</button>
      </div>
    </div>
  </div>

  <script src="../js-src/bodyscript.js"></script>
</body>

</html>
